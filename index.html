<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Profil - Ahmad Muzaki</title>
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <header class="main-header">
      <nav class="nav-primary">
        <!-- Tombol Profil ini akan memicu munculnya sub-nav -->
        <button onclick="router('profil')">Profil</button>
        <button onclick="router('storycam')">Story Cam</button>
        <button onclick="router('cms')">CMS</button>
        <button onclick="showLogin()">Login</button>
        <button id="btn-install" style="display: none; background-color: #007bff; color: white; font-weight: bold; border: none; border-radius: 5px; padding: 8px 15px; cursor: pointer;">📥 Pasang Aplikasi</button>
      </nav>
    </header>

    <nav id="sub-nav" class="sub-nav"></nav>

    <main id="app-view"></main>

    <footer>&copy; 2026 Ahmad Muzaki.</footer>

    <div id="login-modal" class="modal-overlay" style="display: none">
      <div class="login-box">
        <h2>Login Admin</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <label>Username</label>
          <input type="text" id="username" required />

          <label>Password</label>
          <input type="password" id="password" required />

          <button type="submit" class="btn-submit">Login</button>
          <button type="button" class="btn-batal" onclick="closeLogin()">
            Batal
          </button>
        </form>
      </div>
    </div>
  </body>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => {
            console.log("Service Worker terdaftar dengan scope:", reg.scope);
          })
          .catch((err) => {
            console.log("Service Worker gagal terdaftar:", err);
          });
      });
    }

    // Logika PWA Install Button
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      // Mencegah Chrome memunculkan prompt mini infobar bawaan
      e.preventDefault();
      // Simpan event agar bisa dipicu nanti
      deferredPrompt = e;
      
      // Munculkan tombol Pasang Aplikasi yang tadi disembunyikan
      const installBtn = document.getElementById('btn-install');
      if (installBtn) {
        installBtn.style.display = 'inline-block';
        
        installBtn.addEventListener('click', async () => {
          if (deferredPrompt) {
            // Munculkan prompt instalasi bawaan Chrome
            deferredPrompt.prompt();
            // Tunggu user memilih Install atau Cancel
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              console.log('User menerima instalasi PWA');
              installBtn.style.display = 'none'; // Sembunyikan setelah sukses
            }
            deferredPrompt = null;
          }
        });
      }
    });
  </script>
</html>
