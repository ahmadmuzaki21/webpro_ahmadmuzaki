<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Profil - Ahmad Muzaki</title>
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <header class="main-header">
      <nav class="nav-primary">
        <div class="nav-brand" style="flex-grow: 1; font-weight: bold; font-size: 1.2rem; color: #38bdf8; text-align: left;">Ahmad Muzaki</div>
        <button class="hamburger" id="hamburger-btn" style="display: none; background: transparent; border: none; color: #38bdf8; font-size: 1.5rem; cursor: pointer; padding: 0;">☰</button>
        <div class="nav-menu" id="nav-menu">
          <!-- Tombol Profil ini akan memicu munculnya sub-nav -->
          <button onclick="router('profil')">Profil</button>
          <button onclick="router('storycam')">Story Cam</button>
          <button onclick="router('cms')">CMS</button>
          <button onclick="showLogin()">Login</button>
        </div>
      </nav>
    </header>

    <nav id="sub-nav" class="sub-nav"></nav>

    <main id="app-view"></main>

    <footer>&copy; 2026 Ahmad Muzaki.</footer>

    <div id="login-modal" class="modal-overlay" style="display: none">
      <div class="login-box">
        <h2>Login Admin</h2>
        <form id="loginForm" onsubmit="handleLogin(event)">
          <label>Username</label>
          <input type="text" id="username" required />

          <label>Password</label>
          <input type="password" id="password" required />

          <button type="submit" class="btn-submit">Login</button>
          <button type="button" class="btn-batal" onclick="closeLogin()">
            Batal
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
